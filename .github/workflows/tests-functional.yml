name: Tests functional

permissions: {}

on:
  workflow_call:
    inputs:
      testDistro:
        required: true
        type: string
      hostDistro:
        required: true
        type: string
      hostArch:
        required: true
        type: string

env:
  EXPECTED_GO_VERSION: "1.24.1"
  ORAS_VERSION: "1.2.3"

jobs:
  tests-functional:
    name: Functional test suite - ${{ inputs.testDistro }} on ${{ inputs.hostDistro }} ${{ inputs.hostArch }}
    runs-on:
    - self-hosted
    - 1ES.Pool=${{ inputs.hostDistro == 'azl3' && (inputs.hostArch == 'amd64' && 'maritimus-github-runner-azl3-amd64' || 'maritimus-github-runner-azl3-arm64') || (inputs.hostArch == 'amd64' && 'maritimus-github-runner-ubuntu2404-amd64' || 'maritimus-github-runner-ubuntu2404-arm64') }}
    permissions:
      contents: read
      # Azure login.
      id-token: write
    environment: public
    steps:
    - name: setup go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: "${{ env.EXPECTED_GO_VERSION }}"

    - name: Checkout
      uses: actions/checkout@v6
      with:
        path: repo
        persist-credentials: false

    - name: Install prerequisites (AZL3)
      if: inputs.hostDistro == 'azl3'
      run: |
        set -eux

        # Install Image Customizer prerequisities.
        PACKAGES="qemu-img rpm coreutils util-linux systemd openssl \
            sed createrepo_c squashfs-tools cdrkit e2fsprogs dosfstools \
            xfsprogs btrfs-progs zstd veritysetup grub2 binutils lsof \
            git azure-cli systemd-ukify"

        # grub2-pc is only available on x86.
        if [[ "$HOST_ARCH" == "amd64" ]]; then
            PACKAGES+=" grub2-pc"
        fi

        sudo ./repo/.github/workflows/scripts/retry.sh 5 5 \
            tdnf install -y $PACKAGES

        sudo tdnf list installed
      env:
        HOST_ARCH: ${{ inputs.hostArch }}

    - name: Install prerequisites (Ubuntu 24.04)
      if: inputs.hostDistro == 'ubuntu2404'
      run: |
        set -eux

        # Install Image Customizer prerequisities.
        sudo apt list --installed
        sudo apt update -y

        sudo apt -y install qemu-utils rpm coreutils util-linux mount fdisk udev openssl \
          sed createrepo-c squashfs-tools genisoimage e2fsprogs dosfstools \
          xfsprogs btrfs-progs zstd cryptsetup-bin grub2-common binutils lsof systemd-ukify

        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Download base images
      run: |
        set -eux

        download() {
          ./repo/.github/workflows/scripts/download-image.sh "$AZURE_STORAGE" "$AZURE_CONTAINER" "$1" "$2"
        }

        if [[ "$TEST_DISTRO" == "azl" ]]; then
            download "azure-linux/core-efi-vhdx-2.0-$HOST_ARCH" azl-core-efi-2.0
            download "azure-linux/core-efi-vhdx-3.0-$HOST_ARCH" azl-core-efi-3.0
        elif [[ "$TEST_DISTRO" == "ubuntu" ]]; then
            download "ubuntu/azure-cloud-vhdx-22.04-$HOST_ARCH" ubuntu-azure-cloud-22.04
            download "ubuntu/azure-cloud-vhdx-24.04-$HOST_ARCH" ubuntu-azure-cloud-24.04
        else
            echo "ERROR: Unknown TEST_DISTRO: $TEST_DISTRO"
            exit 1
        fi
      env:
        TEST_DISTRO: ${{ inputs.testDistro }}
        HOST_ARCH: ${{ inputs.hostArch }}
        AZURE_STORAGE: ${{ vars.AZURE_STORAGE }}
        AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}

    - name: Download test utils
      run: |
        set -eux
        pushd repo/toolkit/tools
        if [[ "$TEST_DISTRO" == "azl" ]]; then
          ./internal/testutils/testrpms/download-test-utils.sh -d azurelinux -t 3.0 -s true
        elif [[ "$TEST_DISTRO" == "ubuntu" ]]; then
          echo "No test utils needed for Ubuntu tests"
        else
          echo "ERROR: Unknown TEST_DISTRO: $TEST_DISTRO"
          exit 1
        fi
      env:
        TEST_DISTRO: ${{ inputs.testDistro }}

    - name: Run tests
      run: |
        set -euxo pipefail

        pushd repo/toolkit/tools

        AZL2_VHDX=""
        AZL3_VHDX=""
        UBUNTU2204_VHDX=""
        UBUNTU2404_VHDX=""

        if [[ "$TEST_DISTRO" == "azl" ]]; then
          AZL2_VHDX="../../../../../azl-core-efi-2.0/image.vhdx"
          AZL3_VHDX="../../../../../azl-core-efi-3.0/image.vhdx"
        elif [[ "$TEST_DISTRO" == "ubuntu" ]]; then
          UBUNTU2204_VHDX="../../../../../ubuntu-azure-cloud-22.04/image.vhdx"
          UBUNTU2404_VHDX="../../../../../ubuntu-azure-cloud-24.04/image.vhdx"
        else
          echo "ERROR: Unknown TEST_DISTRO: $TEST_DISTRO"
          exit 1
        fi

        TEST_RESULTS_DIR="out/testResults"
        mkdir -p "$TEST_RESULTS_DIR"

        sudo env "PATH=$PATH" go test -v \
          -coverprofile="$TEST_RESULTS_DIR/lib.cov" -covermode count \
          -timeout 150m \
          ./pkg/imagecustomizerlib \
          -args \
          --base-image-core-efi-azl2 "$AZL2_VHDX" \
          --base-image-core-efi-azl3 "$AZL3_VHDX" \
          --base-image-azure-cloud-ubuntu2204 "$UBUNTU2204_VHDX" \
          --base-image-azure-cloud-ubuntu2404 "$UBUNTU2404_VHDX" \
          2>&1 \
          | tee "$TEST_RESULTS_DIR/lib.txt"
      env:
        TEST_DISTRO: ${{ inputs.testDistro }}

    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: tests-results-functional-${{ inputs.testDistro }}-on-${{ inputs.hostDistro }}-${{ inputs.hostArch }}
        path: repo/toolkit/tools/out/testResults
