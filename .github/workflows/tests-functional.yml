name: Tests functional

permissions: {}

on:
  workflow_call:
    inputs:
      hostArch:
        required: true
        type: string
      hostDistro:
        required: true
        type: string

env:
  EXPECTED_GO_VERSION: "1.24.1"
  ORAS_VERSION: "1.2.3"

jobs:
  tests-functional:
    name: Functional test suite - ${{ inputs.hostDistro }} ${{ inputs.hostArch }}
    runs-on:
    - self-hosted
    - 1ES.Pool=${{ inputs.hostDistro == 'azl3' && (inputs.hostArch == 'amd64' && 'maritimus-github-runner-azl3-amd64' || 'maritimus-github-runner-azl3-arm64') || (inputs.hostArch == 'amd64' && 'maritimus-github-runner-ubuntu2404-amd64' || 'maritimus-github-runner-ubuntu2404-arm64') }}
    permissions:
      contents: read
      # Azure login.
      id-token: write
    environment: public
    steps:
    - name: setup go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: "${{ env.EXPECTED_GO_VERSION }}"

    - name: Install gocovmerge
      run: go install github.com/wadey/gocovmerge@latest

    - name: Checkout
      uses: actions/checkout@v6
      with:
        path: repo
        persist-credentials: false

    - name: Install prerequisites (AZL3)
      if: inputs.hostDistro == 'azl3'
      run: |
        set -eux

        # Install Image Customizer prerequisities.
        PACKAGES="qemu-img rpm coreutils util-linux systemd openssl \
            sed createrepo_c squashfs-tools cdrkit e2fsprogs dosfstools \
            xfsprogs btrfs-progs zstd veritysetup grub2 binutils lsof \
            git azure-cli systemd-ukify"

        # grub2-pc is only available on x86.
        if [[ "$HOST_ARCH" == "amd64" ]]; then
            PACKAGES+=" grub2-pc"
        fi

        sudo ./repo/.github/workflows/scripts/retry.sh 5 5 \
            tdnf install -y $PACKAGES

        sudo tdnf list installed
      env:
        HOST_ARCH: ${{ inputs.hostArch }}

    - name: Install prerequisites (Ubuntu 24.04)
      if: inputs.hostDistro == 'ubuntu2404'
      run: |
        set -eux

        # Install Image Customizer prerequisities.
        sudo apt list --installed
        sudo apt update -y

        sudo apt -y install qemu-utils rpm coreutils util-linux mount fdisk udev openssl \
          sed createrepo-c squashfs-tools genisoimage e2fsprogs dosfstools \
          xfsprogs btrfs-progs zstd cryptsetup-bin grub2-common binutils lsof systemd-ukify

        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Test setup
      run: |
        set -eux

        pushd repo/toolkit/tools

        # Download the test RPM files.
        ./internal/testutils/testrpms/download-test-utils.sh -t 3.0 -d azurelinux

        mkdir -p out/testResults

    - name: Run API tests
      run: |
        set -euxo pipefail

        cd repo/toolkit/tools

        sudo env "PATH=$PATH" go test -v \
          -coverprofile=out/testResults/api.cov -covermode count \
          ./imagecustomizerapi \
          2>&1 \
          | tee out/testResults/api.txt

    - name: Test Azure Linux 2
      if: ${{ !cancelled() }}
      run: |
        set -euxo pipefail

        repo/.github/workflows/scripts/download-image.sh "$AZURE_STORAGE" "$AZURE_CONTAINER" \
          "azure-linux/core-efi-vhdx-2.0-$HOST_ARCH" repo/toolkit/tools/azl2-core-efi

        cd repo/toolkit/tools

        sudo env "PATH=$PATH" go test -v \
          -coverprofile=out/testResults/lib-azl2.cov -covermode count \
          -timeout 120m \
          ./pkg/imagecustomizerlib \
          -args \
          --base-image-core-efi-azl2 azl2-core-efi/image.vhdx \
          2>&1 \
          | tee out/testResults/lib-azl2.txt

        rm -rf azl2-core-efi
      env:
        HOST_ARCH: ${{ inputs.hostArch }}
        AZURE_STORAGE: ${{ vars.AZURE_STORAGE }}
        AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}

    - name: Test Azure Linux 3
      if: ${{ !cancelled() }}
      run: |
        set -euxo pipefail

        repo/.github/workflows/scripts/download-image.sh "$AZURE_STORAGE" "$AZURE_CONTAINER" \
          "azure-linux/core-efi-vhdx-3.0-$HOST_ARCH" repo/toolkit/tools/azl3-core-efi

        cd repo/toolkit/tools

        sudo env "PATH=$PATH" go test -v \
          -coverprofile=out/testResults/lib-azl3.cov -covermode count \
          -timeout 120m \
          ./pkg/imagecustomizerlib \
          -args \
          --base-image-core-efi-azl3 azl3-core-efi/image.vhdx \
          2>&1 \
          | tee out/testResults/lib-azl3.txt

        rm -rf azl3-core-efi
      env:
        HOST_ARCH: ${{ inputs.hostArch }}
        AZURE_STORAGE: ${{ vars.AZURE_STORAGE }}
        AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}

    - name: Test Ubuntu 22.04
      if: ${{ !cancelled() }}
      run: |
        set -euxo pipefail

        repo/.github/workflows/scripts/download-image.sh "$AZURE_STORAGE" "$AZURE_CONTAINER" \
          "ubuntu/azure-cloud-22.04-$HOST_ARCH" repo/toolkit/tools/ubuntu22.04-azure-cloud

        cd repo/toolkit/tools

        sudo env "PATH=$PATH" go test -v \
          -coverprofile=out/testResults/lib-ubuntu2204.cov -covermode count \
          -timeout 120m \
          ./pkg/imagecustomizerlib \
          -args \
          --base-image-azure-cloud-ubuntu2204 ubuntu22.04-azure-cloud/image.vhdx \
          2>&1 \
          | tee out/testResults/lib-ubuntu2204.txt

        rm -rf ubuntu22.04-azure-cloud
      env:
        HOST_ARCH: ${{ inputs.hostArch }}
        AZURE_STORAGE: ${{ vars.AZURE_STORAGE }}
        AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}

    - name: Test Ubuntu 24.04
      if: ${{ !cancelled() }}
      run: |
        set -euxo pipefail

        repo/.github/workflows/scripts/download-image.sh "$AZURE_STORAGE" "$AZURE_CONTAINER" \
          "ubuntu/azure-cloud-24.04-$HOST_ARCH" repo/toolkit/tools/ubuntu24.04-azure-cloud

        cd repo/toolkit/tools

        sudo env "PATH=$PATH" go test -v \
          -coverprofile=out/testResults/lib-ubuntu2404.cov -covermode count \
          -timeout 120m \
          ./pkg/imagecustomizerlib \
          -args \
          --base-image-azure-cloud-ubuntu2404 ubuntu24.04-azure-cloud/image.vhdx \
          2>&1 \
          | tee out/testResults/lib-ubuntu2404.txt

        rm -rf ubuntu24.04-azure-cloud
      env:
        HOST_ARCH: ${{ inputs.hostArch }}
        AZURE_STORAGE: ${{ vars.AZURE_STORAGE }}
        AZURE_CONTAINER: ${{ vars.AZURE_CONTAINER }}

    - name: Merge coverage profiles
      if: ${{ !cancelled() }}
      run: |
        set -euxo pipefail

        cd repo/toolkit/tools
        gocovmerge \
          out/testResults/lib-azl2.cov \
          out/testResults/lib-azl3.cov \
          out/testResults/lib-ubuntu2204.cov \
          out/testResults/lib-ubuntu2404.cov \
          > out/testResults/lib.cov

    - uses: actions/upload-artifact@v5
      if: ${{ !cancelled() }}
      with:
        name: tests-results-functional-${{ inputs.hostDistro }}-${{ inputs.hostArch }}
        path: repo/toolkit/tools/out/testResults
