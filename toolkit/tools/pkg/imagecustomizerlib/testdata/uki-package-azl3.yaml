storage:
  disks:
  - partitionTableType: gpt
    partitions:
    - id: esp
      type: esp
      size: 256M

    - id: rootfs
      type: root
      size: 1G

  bootType: efi

  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: rootfs
    type: ext4
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset

  packages:
    remove:
    - grub2-efi-binary
    #- grub2-tools-minimal
    - kernel

    install:
    - kernel-uki
    - systemd-boot
