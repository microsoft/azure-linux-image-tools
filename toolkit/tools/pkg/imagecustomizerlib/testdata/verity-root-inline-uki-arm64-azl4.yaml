# Differs from verity-root-inline-uki-amd64-azl4 in its removal of grub2-efi-aa64 (not grub2-efi-x64).
previewFeatures:
- base-configs

baseConfigs:
- path: verity-root-inline-uki-base.yaml

os:
  selinux:
    mode: disabled

  packages:
    install:
    - openssh-server
    - veritysetup
    - vim
    - device-mapper
    - systemd-boot-unsigned

  additionalFiles:
    # Enable DHCP client on all of the physical NICs.
  - source: files/89-ethernet.network
    destination: /etc/systemd/network/89-ethernet.network

scripts:
  postCustomization:
  - content: |
      # Workaround: shim-<arch> 15.8 has a hard Requires on grub2-efi-<arch>, so dnf
      # refuses to remove grub2-efi-<arch> while shim is installed. Removing shim
      # is not an option because shim is needed for the secure boot chain
      # (UEFI -> shim -> systemd-boot -> kernel) and its EFI binaries on the ESP
      # are extracted as build artifacts. Use rpm --nodeps to bypass this.
      rpm -e --nodeps grub2-efi-aa64
