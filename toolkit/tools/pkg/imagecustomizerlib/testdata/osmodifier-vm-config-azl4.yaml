# Differs from osmodifier-vm-config-amd64 in its removal of selinux-policy-modules
os:
  additionalFiles:
    # Enable DHCP client on all of the physical NICs.
  - source: files/89-ethernet.network
    destination: /etc/systemd/network/89-ethernet.network
  packages:
    install:
    - selinux-policy
    - setools-console
    - policycoreutils-python-utils
