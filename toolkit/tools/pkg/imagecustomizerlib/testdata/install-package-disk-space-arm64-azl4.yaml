# Differs from install-package-disk-space-azl4-amd64 in storage.disks[0].maxSize being 1200M.
storage:
  disks:
  - partitionTableType: gpt

    # Create a small-ish disk.
    maxSize: 1200M
    partitions:
    - id: esp
      type: esp
      start: 1M
      end: 33M

    - id: rootfs
      start: 33M

  bootType: efi

  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: rootfs
    type: ext4
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset

  packages:
    install:
    # Install a large-ish package.
    - gcc
