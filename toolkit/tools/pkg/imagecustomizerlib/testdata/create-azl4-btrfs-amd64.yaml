# Differs from create-azl4-amd64 in the btrfs preview feature being enabled, its use of btrfs (not ext4) for the rootfs filesystem, and its use of btrfs-progs (not e2fsprogs)
previewFeatures:
- create
- btrfs

storage:
  disks:
  - partitionTableType: gpt
    maxSize: 3G
    partitions:
    - id: boot
      type: esp
      size: 32M

    - id: rootfs
      start: 33M

  bootType: efi

  filesystems:
  - deviceId: boot
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: rootfs
    type: btrfs
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset

  packages:
    installLists:
    - create-fedora-noarch-packages.yaml
    - create-fedora-amd64-packages.yaml

    install:
    - btrfs-progs
