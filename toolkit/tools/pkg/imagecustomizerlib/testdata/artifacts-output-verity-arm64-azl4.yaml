# Differs from artifacts-output-verity-amd64-azl4 in its use of grub2-efi-aa64 (not grub2-efi-x64)
previewFeatures:
- uki
- output-artifacts

storage:
  bootType: efi
  disks:
  - partitionTableType: gpt
    partitions:
    - id: esp
      type: esp
      size: 500M

    - id: boot
      size: 1G

    - id: root
      size: 2G

    - id: roothash
      size: 17M

    - id: var
      size: 2G

  verity:
  - id: verityroot
    name: root
    dataDeviceId: root
    hashDeviceId: roothash
    dataDeviceMountIdType: uuid
    hashDeviceMountIdType: uuid
    corruptionOption: restart
    hashSignaturePath: /boot/root.hash

  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: boot
    type: ext4
    mountPoint:
      path: /boot

  - deviceId: verityroot
    type: ext4
    mountPoint:
      path: /
      options: ro

  - deviceId: var
    type: ext4
    mountPoint:
      path: /var

output:
  artifacts:
    items: 
    - ukis
    - shim
    - bootloader
    - verity-hash
    path: ./output

os:
  bootloader:
    resetType: hard-reset

  uki:
    mode: create

  packages:
    install:
    - systemd-boot-unsigned
    - openssh-server

  services:
    enable:
    - sshd

scripts:
  postCustomization:
  - content: |
      # Workaround: shim-<arch> 15.8 has a hard Requires on grub2-efi-<arch>, so dnf
      # refuses to remove grub2-efi-<arch> while shim is installed. Removing shim
      # is not an option because shim is needed for the secure boot chain
      # (UEFI -> shim -> systemd-boot -> kernel) and its EFI binaries on the ESP
      # are extracted as build artifacts. Use rpm --nodeps to bypass this.
      # Fixed in shim 16.1+ (Fedora 44+) which drops the hard grub2 dep.
      rpm -e --nodeps grub2-efi-aa64
