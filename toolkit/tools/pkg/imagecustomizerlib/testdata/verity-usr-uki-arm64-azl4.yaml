# Differs from verity-usr-uki-amd64-azl4 in its use of systemd-boot-unsigned (not systemd-boot) and grub2-efi-aa64 (not grub2-efi-binary)
previewFeatures:
- uki

storage:
  bootType: efi
  disks:
  - partitionTableType: gpt
    partitions:
    - id: esp
      type: esp
      size: 250M

    - id: boot
      size: 1G

    - id: usr
      size: 1G

    - id: usrhash
      size: 100M

    - id: root
      size: 500M

    - id: var
      size: 1G

  verity:
  - id: verityusr
    name: usr
    dataDeviceId: usr
    hashDeviceId: usrhash
    corruptionOption: panic

  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: boot
    type: ext4
    mountPoint: /boot

  - deviceId: root
    type: ext4
    mountPoint:
      path: /
      options: noexec

  - deviceId: verityusr
    type: ext4
    mountPoint:
      path: /usr
      options: ro

  - deviceId: var
    type: ext4
    mountPoint: /var

os:
  bootloader:
    resetType: hard-reset

  kernelCommandLine:
    extraCommandLine:
    - rd.info

  uki:
    mode: create

  packages:
    install:
    - openssh-server
    - veritysetup
    - systemd-boot-unsigned
    - device-mapper

scripts:
  postCustomization:
  - content: |
      # Workaround: shim-<arch> 15.8 has a hard Requires on grub2-efi-<arch>, so dnf
      # refuses to remove grub2-efi-<arch> while shim is installed. Removing shim
      # is not an option because shim is needed for the secure boot chain
      # (UEFI -> shim -> systemd-boot -> kernel) and its EFI binaries on the ESP
      # are extracted as build artifacts. Use rpm --nodeps to bypass this.
      # Fixed in shim 16.1+ (Fedora 44+) which drops the hard grub2 dep.
      rpm -e --nodeps grub2-efi-aa64
