# Differs from iso-bootstrap-vm-azl3 in the kernel version and its use of selinux-policy-targeted (not selinux-policy-modules)
iso:
  initramfsType: bootstrap

os:
  selinux:
    mode: enforcing

  packages:
    install:
    # multi-kernel test
    - kernel-6.18.5-1.8.azl4~20260420
    # iso required packages
    - squashfs-tools
    - tar
    - device-mapper
    - curl
    # Required packages for SELinux.
    - selinux-policy
    - selinux-policy-targeted

  additionalFiles:
    # Enable DHCP client on all of the physical NICs.
  - source: files/89-ethernet.network
    destination: /etc/systemd/network/89-ethernet.network
