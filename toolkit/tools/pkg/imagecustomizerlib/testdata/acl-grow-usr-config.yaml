# ACL-only, preview-gated config: grow /usr (and re-seal verity) so packages that would overflow
# the stock 1 GiB /usr fit, and set extra kernel cmdline args baked into the regenerated UKIs.
# Requires the 'acl-grow-partitions', 'reinitialize-verity', and 'uki' preview features and an ACL
# target image.
storage:
  reinitializeVerity: all

acl:
  usr:
    size: 2G

os:
  uki:
    kernels: auto
    mode: create

  kernelCommandLine:
    extraCommandLine:
    - flatcar.autologin
    - console=ttyAMA0,115200n8

  packages:
    install:
    - vim
