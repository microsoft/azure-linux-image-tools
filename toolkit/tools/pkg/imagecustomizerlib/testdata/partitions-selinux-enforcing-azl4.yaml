# Differs from partitions-selinux-enforcing-azl3 in its removal of selinux-policy-modules
storage:
  disks:
  - partitionTableType: gpt
    maxSize: 4G
    partitions:
    - id: esp
      type: esp
      start: 1M
      end: 33M

    - id: boot
      start: 33M
      end: 1G

    - id: rootfs
      start: 1G

  bootType: efi

  filesystems:
  - deviceId: esp
    type: vfat
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: boot
    type: ext4
    mountPoint:
      path: /boot

  - deviceId: rootfs
    type: ext4
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset

  selinux:
    mode: enforcing

  packages:
    install:
    - selinux-policy
    - setools-console
    - policycoreutils-python-utils
