# Differs from create-azl4-amd64 in its addition of efibootmgr and initial-setup
previewFeatures:
- create
- preview-distro-version
- tools-dir
- base-configs

baseConfigs:
- path: create-base.yaml

os:
  packages:
    installLists:
    - create-fedora-noarch-packages.yaml
    - create-fedora-amd64-packages.yaml

    install:
    - e2fsprogs
    - efibootmgr
    - initial-setup
