# Differs from create-fedora-amd64 in the btrfs preview feature being enabled, its use of btrfs (not ext4) for the rootfs filesystem, and its use of btrfs-progs (not e2fsprogs)
previewFeatures:
- create
- preview-distro-version
- tools-dir
- base-configs

baseConfigs:
- path: create-btrfs-base.yaml

os:
  packages:
    installLists:
    - create-fedora-noarch-packages.yaml
    - create-fedora-amd64-packages.yaml

    install:
    - btrfs-progs
    - efibootmgr
    - initial-setup
