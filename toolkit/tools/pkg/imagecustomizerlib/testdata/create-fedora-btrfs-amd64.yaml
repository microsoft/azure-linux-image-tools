# Differs from create-fedora-amd64 in that it:
#
# - Enables the btrfs preview feature
# - Declares a btrfs (not ext4) rootfs filesystem
# - Installs btrfs-progs (not e2fsprogs)
previewFeatures:
- create
- btrfs

storage:
  disks:
  - partitionTableType: gpt

    partitions:
    - id: boot
      type: esp
      size: 32M

    - id: rootfs
      size: 3G

  bootType: efi

  filesystems:
  - deviceId: boot
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: rootfs
    type: btrfs
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset

  packages:
    installLists:
    - create-fedora-noarch-packages.yaml
    - create-fedora-amd64-packages.yaml

    install:
    - btrfs-progs
