# Differs from verity-usr-uki-azl3 in its use of systemd-boot-unsigned (not systemd-boot), its use of grub2-efi-x64 (not grub2-efi-binary), and the absence of a post-customization script
previewFeatures:
- uki

storage:
  bootType: efi
  disks:
  - partitionTableType: gpt
    partitions:
    - id: esp
      type: esp
      size: 250M

    - id: boot
      size: 1G

    - id: usr
      size: 1G

    - id: usrhash
      size: 100M

    - id: root
      size: 500M

    - id: var
      size: 1G

  verity:
  - id: verityusr
    name: usr
    dataDeviceId: usr
    hashDeviceId: usrhash
    corruptionOption: panic

  filesystems:
  - deviceId: esp
    type: fat32
    mountPoint:
      path: /boot/efi
      options: umask=0077

  - deviceId: boot
    type: ext4
    mountPoint: /boot

  - deviceId: root
    type: ext4
    mountPoint:
      path: /
      options: noexec

  - deviceId: verityusr
    type: ext4
    mountPoint:
      path: /usr
      options: ro

  - deviceId: var
    type: ext4
    mountPoint: /var

os:
  bootloader:
    resetType: hard-reset

  kernelCommandLine:
    extraCommandLine:
    - rd.info

  uki:
    mode: create

  packages:
    remove:
    - grub2-efi-x64

    install:
    - openssh-server
    - veritysetup
    - systemd-boot-unsigned
    - device-mapper
