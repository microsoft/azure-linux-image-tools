# Differs from create-fedora-btrfs-amd64 in its use of create-fedora-arm64-packages (not create-fedora-amd64-packages)
previewFeatures:
- create
- preview-distro-version
- tools-dir
- base-configs

baseConfigs:
- path: create-btrfs-base.yaml

os:
  packages:
    installLists:
    - create-fedora-noarch-packages.yaml
    - create-fedora-arm64-packages.yaml

    install:
    - btrfs-progs
    - efibootmgr
    - initial-setup
