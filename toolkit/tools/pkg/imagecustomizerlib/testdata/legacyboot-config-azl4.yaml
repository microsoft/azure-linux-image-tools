storage:
  disks:
  - partitionTableType: gpt
    maxSize: 4G
    partitions:
    - id: boot
      type: bios-grub
      start: 1M
      size: 1023M

    - id: rootfs
      start: 1G
      size: grow

  bootType: legacy

  filesystems:
  - deviceId: rootfs
    type: ext4
    mountPoint:
      path: /

os:
  bootloader:
    resetType: hard-reset
